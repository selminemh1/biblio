<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head(${member.id != null ? 'Modifier le membre' : 'Nouveau membre'})}"></head>
<body>
    <nav th:replace="~{fragments/layout :: navbar}"></nav>
    
    <div class="container-fluid">
        <div class="row">
            <div class="col-md-2 p-0">
                <div th:replace="~{fragments/layout :: sidebar}"></div>
            </div>
            <div class="col-md-10">
                <div class="content-wrapper">
                    <div class="page-header">
                        <h1>
                            <i class="bi bi-person-plus me-2"></i>
                            <span th:text="${member.id != null ? 'Modifier le membre' : 'Nouveau membre'}"></span>
                        </h1>
                    </div>

                    <div class="card">
                        <div class="card-body p-4">
                            <form th:action="${member.id != null ? '/members/' + member.id : '/members'}" 
                                  th:object="${member}" method="post">
                                <div class="row">
                                    <div class="col-md-6">
                                        <div class="mb-3">
                                            <label class="form-label fw-semibold">Prénom *</label>
                                            <input type="text" th:field="*{firstName}" class="form-control" 
                                                   th:classappend="${#fields.hasErrors('firstName')} ? 'is-invalid'" required>
                                            <div class="invalid-feedback" th:if="${#fields.hasErrors('firstName')}" th:errors="*{firstName}"></div>
                                        </div>
                                    </div>
                                    <div class="col-md-6">
                                        <div class="mb-3">
                                            <label class="form-label fw-semibold">Nom *</label>
                                            <input type="text" th:field="*{lastName}" class="form-control" 
                                                   th:classappend="${#fields.hasErrors('lastName')} ? 'is-invalid'" required>
                                            <div class="invalid-feedback" th:if="${#fields.hasErrors('lastName')}" th:errors="*{lastName}"></div>
                                        </div>
                                    </div>
                                </div>

                                <div class="row">
                                    <div class="col-md-6">
                                        <div class="mb-3">
                                            <label class="form-label fw-semibold">Email *</label>
                                            <input type="email" th:field="*{email}" class="form-control" 
                                                   th:classappend="${#fields.hasErrors('email')} ? 'is-invalid'" required>
                                            <div class="invalid-feedback" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></div>
                                        </div>
                                    </div>
                                    <div class="col-md-6">
                                        <div class="mb-3">
                                            <label class="form-label fw-semibold">Téléphone</label>
                                            <input type="tel" th:field="*{phone}" class="form-control">
                                        </div>
                                    </div>
                                </div>

                                <div class="mb-3">
                                    <label class="form-label fw-semibold">Adresse</label>
                                    <textarea th:field="*{address}" class="form-control" rows="2"></textarea>
                                </div>

                                <div class="row">
                                    <div class="col-md-6">
                                        <div class="mb-3">
                                            <label class="form-label fw-semibold">Date d'inscription</label>
                                            <input type="date" th:field="*{membershipDate}" class="form-control">
                                        </div>
                                    </div>
                                    <div class="col-md-6">
                                        <div class="mb-3">
                                            <label class="form-label fw-semibold">Statut</label>
                                            <select th:field="*{status}" class="form-select">
                                                <option th:each="status : ${statuses}" th:value="${status}" th:text="${status}"></option>
                                            </select>
                                        </div>
                                    </div>
                                </div>

                                <div class="d-flex justify-content-between pt-3 border-top">
                                    <a th:href="@{/members}" class="btn btn-outline-secondary">
                                        <i class="bi bi-arrow-left me-1"></i>Annuler
                                    </a>
                                    <button type="submit" class="btn btn-primary">
                                        <i class="bi bi-check-circle me-1"></i>
                                        <span th:text="${member.id != null ? 'Mettre à jour' : 'Créer le membre'}"></span>
                                    </button>
                                </div>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <footer th:replace="~{fragments/layout :: scripts}"></footer>
</body>
</html>
