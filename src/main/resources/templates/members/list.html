<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Membres')}"></head>
<body>
    <nav th:replace="~{fragments/layout :: navbar}"></nav>
    
    <div class="container-fluid">
        <div class="row">
            <div class="col-md-2 p-0">
                <div th:replace="~{fragments/layout :: sidebar}"></div>
            </div>
            <div class="col-md-10">
                <div class="content-wrapper">
                    <div th:replace="~{fragments/layout :: alerts}"></div>
                    
                    <div class="page-header d-flex justify-content-between align-items-center">
                        <h1><i class="bi bi-people me-2"></i>Membres</h1>
                        <div class="d-flex gap-2">
                            <form th:action="@{/members/search}" method="get" class="d-flex">
                                <input type="text" name="query" class="form-control me-2" placeholder="Rechercher...">
                                <button type="submit" class="btn btn-outline-primary"><i class="bi bi-search"></i></button>
                            </form>
                            <a th:href="@{/members/new}" class="btn btn-primary">
                                <i class="bi bi-person-plus me-1"></i>Nouveau membre
                            </a>
                        </div>
                    </div>

                    <div class="card">
                        <div class="card-body p-0">
                            <div class="table-responsive">
                                <table class="table table-hover mb-0">
                                    <thead>
                                        <tr>
                                            <th>Membre</th>
                                            <th>Email</th>
                                            <th>Téléphone</th>
                                            <th>Date d'inscription</th>
                                            <th>Statut</th>
                                            <th>Actions</th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        <tr th:each="member : ${members}">
                                            <td>
                                                <div class="d-flex align-items-center">
                                                    <div class="bg-success text-white rounded-circle d-flex align-items-center justify-content-center me-2" 
                                                         style="width: 40px; height: 40px; font-size: 0.9rem;">
                                                        <span th:text="${member.firstName.charAt(0)}"></span><span th:text="${member.lastName.charAt(0)}"></span>
                                                    </div>
                                                    <div>
                                                        <a th:href="@{/members/{id}(id=${member.id})}" class="text-decoration-none fw-semibold" th:text="${member.fullName}"></a>
                                                    </div>
                                                </div>
                                            </td>
                                            <td><a th:href="'mailto:' + ${member.email}" th:text="${member.email}"></a></td>
                                            <td th:text="${member.phone ?: '-'}"></td>
                                            <td th:text="${#temporals.format(member.membershipDate, 'dd/MM/yyyy')}"></td>
                                            <td>
                                                <span th:if="${member.status.name() == 'ACTIVE'}" class="badge bg-success">Actif</span>
                                                <span th:if="${member.status.name() == 'SUSPENDED'}" class="badge bg-warning">Suspendu</span>
                                                <span th:if="${member.status.name() == 'EXPIRED'}" class="badge bg-danger">Expiré</span>
                                            </td>
                                            <td>
                                                <div class="btn-group btn-group-sm">
                                                    <a th:href="@{/members/{id}(id=${member.id})}" class="btn btn-outline-primary" title="Voir">
                                                        <i class="bi bi-eye"></i>
                                                    </a>
                                                    <a th:href="@{/members/{id}/edit(id=${member.id})}" class="btn btn-outline-secondary" title="Modifier">
                                                        <i class="bi bi-pencil"></i>
                                                    </a>
                                                    <form th:action="@{/members/{id}/delete(id=${member.id})}" method="post" class="d-inline"
                                                          onsubmit="return confirm('Êtes-vous sûr?')">
                                                        <button type="submit" class="btn btn-outline-danger" title="Supprimer">
                                                            <i class="bi bi-trash"></i>
                                                        </button>
                                                    </form>
                                                </div>
                                            </td>
                                        </tr>
                                        <tr th:if="${#lists.isEmpty(members)}">
                                            <td colspan="6" class="text-center py-5 text-muted">
                                                <i class="bi bi-people fs-1 d-block mb-2"></i>
                                                Aucun membre trouvé
                                                <br>
                                                <a th:href="@{/members/new}" class="btn btn-primary mt-3">Ajouter un membre</a>
                                            </td>
                                        </tr>
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <footer th:replace="~{fragments/layout :: scripts}"></footer>
</body>
</html>
