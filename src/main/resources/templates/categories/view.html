<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Détails de la catégorie')}"></head>
<body>
    <nav th:replace="~{fragments/layout :: navbar}"></nav>
    
    <div class="container-fluid">
        <div class="row">
            <div class="col-md-2 p-0">
                <div th:replace="~{fragments/layout :: sidebar}"></div>
            </div>
            <div class="col-md-10">
                <div class="content-wrapper">
                    <div class="page-header d-flex justify-content-between align-items-center">
                        <div>
                            <nav aria-label="breadcrumb">
                                <ol class="breadcrumb mb-2">
                                    <li class="breadcrumb-item"><a th:href="@{/categories}">Catégories</a></li>
                                    <li class="breadcrumb-item active" th:text="${category.name}"></li>
                                </ol>
                            </nav>
                            <h1 th:text="${category.name}"></h1>
                        </div>
                        <a th:href="@{/categories/{id}/edit(id=${category.id})}" class="btn btn-outline-primary">
                            <i class="bi bi-pencil me-1"></i>Modifier
                        </a>
                    </div>

                    <div class="card mb-4" th:if="${category.description != null}">
                        <div class="card-body">
                            <p class="mb-0" th:text="${category.description}"></p>
                        </div>
                    </div>

                    <div class="card">
                        <div class="card-header bg-white d-flex justify-content-between align-items-center">
                            <h5 class="mb-0">Livres dans cette catégorie</h5>
                            <span class="badge bg-primary" th:text="${#lists.size(books)} + ' livre(s)'"></span>
                        </div>
                        <div class="card-body p-0">
                            <div class="table-responsive">
                                <table class="table table-hover mb-0">
                                    <thead>
                                        <tr>
                                            <th>Titre</th>
                                            <th>ISBN</th>
                                            <th>Auteur(s)</th>
                                            <th>Disponibilité</th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        <tr th:each="book : ${books}">
                                            <td>
                                                <a th:href="@{/books/{id}(id=${book.id})}" class="text-decoration-none fw-semibold" th:text="${book.title}"></a>
                                            </td>
                                            <td><code th:text="${book.isbn}"></code></td>
                                            <td>
                                                <span th:each="author, iterStat : ${book.authors}">
                                                    <span th:text="${author.fullName}"></span><span th:if="${!iterStat.last}">, </span>
                                                </span>
                                            </td>
                                            <td>
                                                <span th:if="${book.available}" class="badge bg-success">Disponible</span>
                                                <span th:if="${!book.available}" class="badge bg-danger">Indisponible</span>
                                            </td>
                                        </tr>
                                        <tr th:if="${#lists.isEmpty(books)}">
                                            <td colspan="4" class="text-center py-4 text-muted">
                                                Aucun livre dans cette catégorie
                                            </td>
                                        </tr>
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <footer th:replace="~{fragments/layout :: scripts}"></footer>
</body>
</html>
