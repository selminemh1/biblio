<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Catégories')}"></head>
<body>
    <nav th:replace="~{fragments/layout :: navbar}"></nav>
    
    <div class="container-fluid">
        <div class="row">
            <div class="col-md-2 p-0">
                <div th:replace="~{fragments/layout :: sidebar}"></div>
            </div>
            <div class="col-md-10">
                <div class="content-wrapper">
                    <div th:replace="~{fragments/layout :: alerts}"></div>
                    
                    <div class="page-header d-flex justify-content-between align-items-center">
                        <h1><i class="bi bi-tags me-2"></i>Catégories</h1>
                        <a th:href="@{/categories/new}" class="btn btn-primary">
                            <i class="bi bi-plus-circle me-1"></i>Nouvelle catégorie
                        </a>
                    </div>

                    <div class="row row-cols-1 row-cols-md-3 row-cols-lg-4 g-4">
                        <div class="col" th:each="category : ${categories}">
                            <div class="card h-100">
                                <div class="card-body">
                                    <div class="d-flex align-items-center mb-3">
                                        <div class="bg-primary bg-opacity-10 text-primary rounded p-3 me-3">
                                            <i class="bi bi-tag fs-4"></i>
                                        </div>
                                        <div>
                                            <h5 class="card-title mb-0" th:text="${category.name}"></h5>
                                        </div>
                                    </div>
                                    <p class="text-muted small" th:text="${category.description ?: 'Aucune description'}"></p>
                                </div>
                                <div class="card-footer bg-white border-0 d-flex justify-content-between align-items-center">
                                    <a th:href="@{/books/category/{id}(id=${category.id})}" class="text-decoration-none">
                                        Voir les livres <i class="bi bi-arrow-right"></i>
                                    </a>
                                    <div class="btn-group btn-group-sm">
                                        <a th:href="@{/categories/{id}/edit(id=${category.id})}" class="btn btn-outline-secondary">
                                            <i class="bi bi-pencil"></i>
                                        </a>
                                        <form th:action="@{/categories/{id}/delete(id=${category.id})}" method="post" class="d-inline"
                                              onsubmit="return confirm('Êtes-vous sûr?')">
                                            <button type="submit" class="btn btn-outline-danger">
                                                <i class="bi bi-trash"></i>
                                            </button>
                                        </form>
                                    </div>
                                </div>
                            </div>
                        </div>
                        <div class="col-12" th:if="${#lists.isEmpty(categories)}">
                            <div class="card">
                                <div class="card-body text-center py-5 text-muted">
                                    <i class="bi bi-tags fs-1 d-block mb-2"></i>
                                    Aucune catégorie trouvée
                                    <br>
                                    <a th:href="@{/categories/new}" class="btn btn-primary mt-3">Ajouter une catégorie</a>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <footer th:replace="~{fragments/layout :: scripts}"></footer>
</body>
</html>
