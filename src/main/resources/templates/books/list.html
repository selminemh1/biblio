<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Livres')}"></head>
<body>
    <nav th:replace="~{fragments/layout :: navbar}"></nav>
    
    <div class="container-fluid">
        <div class="row">
            <div class="col-md-2 p-0">
                <div th:replace="~{fragments/layout :: sidebar}"></div>
            </div>
            <div class="col-md-10">
                <div class="content-wrapper">
                    <div th:replace="~{fragments/layout :: alerts}"></div>
                    
                    <div class="page-header d-flex justify-content-between align-items-center">
                        <div>
                            <h1><i class="bi bi-book me-2"></i>Livres</h1>
                            <p class="text-muted mb-0" th:if="${categoryName}">Catégorie: <span th:text="${categoryName}"></span></p>
                            <p class="text-muted mb-0" th:if="${searchQuery}">Recherche: "<span th:text="${searchQuery}"></span>"</p>
                        </div>
                        <div class="d-flex gap-2">
                            <form th:action="@{/books/search}" method="get" class="d-flex">
                                <input type="text" name="query" class="form-control me-2" placeholder="Rechercher un livre...">
                                <button type="submit" class="btn btn-outline-primary"><i class="bi bi-search"></i></button>
                            </form>
                            <a th:href="@{/books/new}" class="btn btn-primary">
                                <i class="bi bi-plus-circle me-1"></i>Nouveau livre
                            </a>
                        </div>
                    </div>

                    <div class="card">
                        <div class="card-body p-0">
                            <div class="table-responsive">
                                <table class="table table-hover mb-0">
                                    <thead>
                                        <tr>
                                            <th>Titre</th>
                                            <th>ISBN</th>
                                            <th>Auteur(s)</th>
                                            <th>Catégorie</th>
                                            <th>Disponibilité</th>
                                            <th>Actions</th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        <tr th:each="book : ${books}">
                                            <td>
                                                <a th:href="@{/books/{id}(id=${book.id})}" class="text-decoration-none fw-semibold">
                                                    <span th:text="${book.title}"></span>
                                                </a>
                                            </td>
                                            <td><code th:text="${book.isbn}"></code></td>
                                            <td>
                                                <span th:each="author, iterStat : ${book.authors}">
                                                    <span th:text="${author.fullName}"></span><span th:if="${!iterStat.last}">, </span>
                                                </span>
                                                <span th:if="${#sets.isEmpty(book.authors)}" class="text-muted">Non spécifié</span>
                                            </td>
                                            <td>
                                                <span class="badge bg-secondary" th:text="${book.category?.name ?: 'Non catégorisé'}"></span>
                                            </td>
                                            <td>
                                                <span th:if="${book.available}" class="badge bg-success">
                                                    <span th:text="${book.availableCopies}"></span>/<span th:text="${book.totalCopies}"></span> disponibles
                                                </span>
                                                <span th:if="${!book.available}" class="badge bg-danger">Indisponible</span>
                                            </td>
                                            <td>
                                                <div class="btn-group btn-group-sm">
                                                    <a th:href="@{/books/{id}(id=${book.id})}" class="btn btn-outline-primary" title="Voir">
                                                        <i class="bi bi-eye"></i>
                                                    </a>
                                                    <a th:href="@{/books/{id}/edit(id=${book.id})}" class="btn btn-outline-secondary" title="Modifier">
                                                        <i class="bi bi-pencil"></i>
                                                    </a>
                                                    <form th:action="@{/books/{id}/delete(id=${book.id})}" method="post" class="d-inline" 
                                                          onsubmit="return confirm('Êtes-vous sûr de vouloir supprimer ce livre?')">
                                                        <button type="submit" class="btn btn-outline-danger" title="Supprimer">
                                                            <i class="bi bi-trash"></i>
                                                        </button>
                                                    </form>
                                                </div>
                                            </td>
                                        </tr>
                                        <tr th:if="${#lists.isEmpty(books)}">
                                            <td colspan="6" class="text-center py-5 text-muted">
                                                <i class="bi bi-book fs-1 d-block mb-2"></i>
                                                Aucun livre trouvé
                                                <br>
                                                <a th:href="@{/books/new}" class="btn btn-primary mt-3">Ajouter un livre</a>
                                            </td>
                                        </tr>
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <footer th:replace="~{fragments/layout :: scripts}"></footer>
</body>
</html>
