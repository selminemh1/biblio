<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head(${book.id != null ? 'Modifier le livre' : 'Nouveau livre'})}"></head>
<body>
    <nav th:replace="~{fragments/layout :: navbar}"></nav>
    
    <div class="container-fluid">
        <div class="row">
            <div class="col-md-2 p-0">
                <div th:replace="~{fragments/layout :: sidebar}"></div>
            </div>
            <div class="col-md-10">
                <div class="content-wrapper">
                    <div class="page-header">
                        <h1>
                            <i class="bi bi-book me-2"></i>
                            <span th:text="${book.id != null ? 'Modifier le livre' : 'Nouveau livre'}"></span>
                        </h1>
                    </div>

                    <div class="card">
                        <div class="card-body p-4">
                            <form th:action="${book.id != null ? '/books/' + book.id : '/books'}" 
                                  th:object="${book}" method="post">
                                <div class="row">
                                    <div class="col-md-8">
                                        <div class="mb-3">
                                            <label class="form-label fw-semibold">Titre *</label>
                                            <input type="text" th:field="*{title}" class="form-control" 
                                                   th:classappend="${#fields.hasErrors('title')} ? 'is-invalid'" required>
                                            <div class="invalid-feedback" th:if="${#fields.hasErrors('title')}" th:errors="*{title}"></div>
                                        </div>
                                    </div>
                                    <div class="col-md-4">
                                        <div class="mb-3">
                                            <label class="form-label fw-semibold">ISBN *</label>
                                            <input type="text" th:field="*{isbn}" class="form-control" 
                                                   th:classappend="${#fields.hasErrors('isbn')} ? 'is-invalid'" required>
                                            <div class="invalid-feedback" th:if="${#fields.hasErrors('isbn')}" th:errors="*{isbn}"></div>
                                        </div>
                                    </div>
                                </div>

                                <div class="mb-3">
                                    <label class="form-label fw-semibold">Description</label>
                                    <textarea th:field="*{description}" class="form-control" rows="4"></textarea>
                                </div>

                                <div class="row">
                                    <div class="col-md-4">
                                        <div class="mb-3">
                                            <label class="form-label fw-semibold">Catégorie *</label>
                                            <select th:field="*{category}" class="form-select" required>
                                                <option value="">Sélectionner une catégorie</option>
                                                <option th:each="category : ${categories}" 
                                                        th:value="${category.id}" 
                                                        th:text="${category.name}"
                                                        th:selected="${book.category != null && book.category.id == category.id}">
                                                </option>
                                            </select>
                                        </div>
                                    </div>
                                    <div class="col-md-4">
                                        <div class="mb-3">
                                            <label class="form-label fw-semibold">Date de publication</label>
                                            <input type="date" th:field="*{publishedDate}" class="form-control">
                                        </div>
                                    </div>
                                    <div class="col-md-4">
                                        <div class="mb-3">
                                            <label class="form-label fw-semibold">Nombre de pages</label>
                                            <input type="number" th:field="*{pages}" class="form-control" min="1">
                                        </div>
                                    </div>
                                </div>

                                <div class="row">
                                    <div class="col-md-6">
                                        <div class="mb-3">
                                            <label class="form-label fw-semibold">Nombre total d'exemplaires *</label>
                                            <input type="number" th:field="*{totalCopies}" class="form-control" min="1" required>
                                        </div>
                                    </div>
                                    <div class="col-md-6">
                                        <div class="mb-3">
                                            <label class="form-label fw-semibold">Exemplaires disponibles</label>
                                            <input type="number" th:field="*{availableCopies}" class="form-control" min="0">
                                        </div>
                                    </div>
                                </div>

                                <div class="mb-3">
                                    <label class="form-label fw-semibold">Auteur(s)</label>
                                    <select name="authorIds" class="form-select" multiple size="4">
                                        <option th:each="author : ${authors}" 
                                                th:value="${author.id}" 
                                                th:text="${author.fullName}"
                                                th:selected="${book.authors != null && book.authors.contains(author)}">
                                        </option>
                                    </select>
                                    <small class="text-muted">Maintenez Ctrl pour sélectionner plusieurs auteurs</small>
                                </div>

                                <div class="mb-3">
                                    <label class="form-label fw-semibold">URL de la couverture</label>
                                    <input type="url" th:field="*{coverImage}" class="form-control" 
                                           placeholder="https://example.com/cover.jpg">
                                </div>

                                <div class="d-flex justify-content-between pt-3 border-top">
                                    <a th:href="@{/books}" class="btn btn-outline-secondary">
                                        <i class="bi bi-arrow-left me-1"></i>Annuler
                                    </a>
                                    <button type="submit" class="btn btn-primary">
                                        <i class="bi bi-check-circle me-1"></i>
                                        <span th:text="${book.id != null ? 'Mettre à jour' : 'Créer le livre'}"></span>
                                    </button>
                                </div>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <footer th:replace="~{fragments/layout :: scripts}"></footer>
</body>
</html>
