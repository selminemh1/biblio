<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Auteur')}"></head>
<body>
    <nav th:replace="~{fragments/layout :: navbar}"></nav>
    
    <div class="container-fluid">
        <div class="row">
            <div class="col-md-2 p-0">
                <div th:replace="~{fragments/layout :: sidebar}"></div>
            </div>
            <div class="col-md-10">
                <div class="content-wrapper">
                    <div class="page-header">
                        <h1>
                            <i class="bi bi-pen me-2"></i>
                            <span th:if="${author.id != null}">Modifier auteur</span>
                            <span th:if="${author.id == null}">Nouvel auteur</span>
                        </h1>
                    </div>

                    <div class="card">
                        <div class="card-body p-4">
                            <form th:action="${author.id != null ? '/authors/' + author.id : '/authors'}" 
                                  th:object="${author}" method="post">
                                <div class="row">
                                    <div class="col-md-6">
                                        <div class="mb-3">
                                            <label class="form-label fw-semibold">Prénom *</label>
                                            <input type="text" th:field="*{firstName}" class="form-control" 
                                                   th:classappend="${#fields.hasErrors('firstName')} ? 'is-invalid'" required>
                                            <div class="invalid-feedback" th:if="${#fields.hasErrors('firstName')}" th:errors="*{firstName}"></div>
                                        </div>
                                    </div>
                                    <div class="col-md-6">
                                        <div class="mb-3">
                                            <label class="form-label fw-semibold">Nom *</label>
                                            <input type="text" th:field="*{lastName}" class="form-control" 
                                                   th:classappend="${#fields.hasErrors('lastName')} ? 'is-invalid'" required>
                                            <div class="invalid-feedback" th:if="${#fields.hasErrors('lastName')}" th:errors="*{lastName}"></div>
                                        </div>
                                    </div>
                                </div>

                                <div class="mb-3">
                                    <label class="form-label fw-semibold">Nationalité</label>
                                    <input type="text" th:field="*{nationality}" class="form-control">
                                </div>

                                <div class="mb-3">
                                    <label class="form-label fw-semibold">Biographie</label>
                                    <textarea th:field="*{biography}" class="form-control" rows="5"></textarea>
                                </div>

                                <div class="d-flex justify-content-between pt-3 border-top">
                                    <a th:href="@{/authors}" class="btn btn-outline-secondary">
                                        <i class="bi bi-arrow-left me-1"></i>Annuler
                                    </a>
                                    <button type="submit" class="btn btn-primary">
                                        <i class="bi bi-check-circle me-1"></i>
                                        <span th:if="${author.id != null}">Mettre à jour</span>
                                        <span th:if="${author.id == null}">Créer</span>
                                    </button>
                                </div>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <footer th:replace="~{fragments/layout :: scripts}"></footer>
</body>
</html>
