<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Auteur')}"></head>
<body>
    <nav th:replace="~{fragments/layout :: navbar}"></nav>
    
    <div class="container-fluid">
        <div class="row">
            <div class="col-md-2 p-0">
                <div th:replace="~{fragments/layout :: sidebar}"></div>
            </div>
            <div class="col-md-10">
                <div class="content-wrapper">
                    <div class="page-header d-flex justify-content-between align-items-center">
                        <div>
                            <nav aria-label="breadcrumb">
                                <ol class="breadcrumb mb-2">
                                    <li class="breadcrumb-item"><a th:href="@{/authors}">Auteurs</a></li>
                                    <li class="breadcrumb-item active" th:text="${author.fullName}"></li>
                                </ol>
                            </nav>
                            <h1 th:text="${author.fullName}"></h1>
                        </div>
                        <div class="d-flex gap-2">
                            <a th:href="@{/authors/{id}/edit(id=${author.id})}" class="btn btn-outline-primary">
                                <i class="bi bi-pencil me-1"></i>Modifier
                            </a>
                        </div>
                    </div>

                    <div class="row">
                        <div class="col-md-4">
                            <div class="card mb-4">
                                <div class="card-body text-center">
                                    <div class="bg-primary text-white rounded-circle d-inline-flex align-items-center justify-content-center mb-3" 
                                         style="width: 120px; height: 120px; font-size: 3rem;">
                                        <span th:text="${author.firstName.charAt(0)}"></span><span th:text="${author.lastName.charAt(0)}"></span>
                                    </div>
                                    <h4 th:text="${author.fullName}"></h4>
                                    <p class="text-muted" th:if="${author.nationality}" th:text="${author.nationality}"></p>
                                </div>
                            </div>
                        </div>
                        
                        <div class="col-md-8">
                            <div class="card mb-4" th:if="${author.biography != null}">
                                <div class="card-header bg-white">
                                    <h5 class="mb-0">Biographie</h5>
                                </div>
                                <div class="card-body">
                                    <p th:text="${author.biography}"></p>
                                </div>
                            </div>

                            <div class="card">
                                <div class="card-header bg-white d-flex justify-content-between align-items-center">
                                    <h5 class="mb-0">Livres de cet auteur</h5>
                                    <span class="badge bg-primary" th:text="${#lists.size(books)} + ' livre(s)'"></span>
                                </div>
                                <div class="card-body p-0">
                                    <div class="list-group list-group-flush">
                                        <a th:each="book : ${books}" th:href="@{/books/{id}(id=${book.id})}" 
                                           class="list-group-item list-group-item-action d-flex justify-content-between align-items-center">
                                            <div>
                                                <strong th:text="${book.title}"></strong>
                                                <br>
                                                <small class="text-muted" th:text="${book.category?.name}"></small>
                                            </div>
                                            <span th:if="${book.available}" class="badge bg-success">Disponible</span>
                                            <span th:if="${!book.available}" class="badge bg-danger">Indisponible</span>
                                        </a>
                                    </div>
                                    <div th:if="${#lists.isEmpty(books)}" class="text-center py-4 text-muted">
                                        Aucun livre associé à cet auteur
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <footer th:replace="~{fragments/layout :: scripts}"></footer>
</body>
</html>
