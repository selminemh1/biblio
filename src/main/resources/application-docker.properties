# =============================================================
# Profil Docker — application-docker.properties
# Activé automatiquement dans le conteneur via -Dspring.profiles.active=docker
# Les valeurs ${...} sont injectées par docker-compose.yml (dev)
# ou par AWS ECS Task Definition depuis Secrets Manager (prod)
# =============================================================

# Application
spring.application.name=Library Management System

# Serveur
server.port=8081

# ─── Base de données MySQL ───────────────────────────────────
# Variables injectées par l'environnement (jamais en dur dans le code)
spring.datasource.url=jdbc:mysql://${DB_HOST}:${DB_PORT}/${DB_NAME}?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Pool de connexions
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.connection-timeout=20000

# ─── JPA / Hibernate ─────────────────────────────────────────
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# ─── Thymeleaf ───────────────────────────────────────────────
spring.thymeleaf.cache=true
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html

# ─── Actuator & Monitoring (Prometheus) ──────────────────────
management.endpoints.web.exposure.include=health,info,prometheus,metrics
management.endpoint.health.show-details=always
management.endpoint.prometheus.enabled=true
management.metrics.export.prometheus.enabled=true
management.metrics.tags.application=library-management

# ─── Logging ─────────────────────────────────────────────────
logging.level.com.library=INFO
logging.level.org.hibernate.SQL=WARN
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

# DevTools désactivé en conteneur
spring.devtools.restart.enabled=false