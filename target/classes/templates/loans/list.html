<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Emprunts')}"></head>
<body>
    <nav th:replace="~{fragments/layout :: navbar}"></nav>
    
    <div class="container-fluid">
        <div class="row">
            <div class="col-md-2 p-0">
                <div th:replace="~{fragments/layout :: sidebar}"></div>
            </div>
            <div class="col-md-10">
                <div class="content-wrapper">
                    <div th:replace="~{fragments/layout :: alerts}"></div>
                    
                    <div class="page-header d-flex justify-content-between align-items-center">
                        <div>
                            <h1><i class="bi bi-arrow-left-right me-2"></i>Emprunts</h1>
                            <p class="text-muted mb-0" th:if="${showActiveOnly}">Affichage des emprunts actifs uniquement</p>
                            <p class="text-muted mb-0 text-danger" th:if="${showOverdueOnly}">Affichage des emprunts en retard</p>
                        </div>
                        <div class="d-flex gap-2">
                            <a th:href="@{/loans}" class="btn btn-outline-secondary" th:classappend="${showActiveOnly == null && showOverdueOnly == null} ? 'active' : ''">Tous</a>
                            <a th:href="@{/loans/active}" class="btn btn-outline-warning" th:classappend="${showActiveOnly != null && showActiveOnly} ? 'active' : ''">Actifs</a>
                            <a th:href="@{/loans/overdue}" class="btn btn-outline-danger" th:classappend="${showOverdueOnly != null && showOverdueOnly} ? 'active' : ''">En retard</a>
                            <a th:href="@{/loans/new}" class="btn btn-primary">
                                <i class="bi bi-plus-circle me-1"></i>Nouvel emprunt
                            </a>
                        </div>
                    </div>

                    <div class="card">
                        <div class="card-body p-0">
                            <div class="table-responsive">
                                <table class="table table-hover mb-0">
                                    <thead>
                                        <tr>
                                            <th>#</th>
                                            <th>Livre</th>
                                            <th>Membre</th>
                                            <th>Date emprunt</th>
                                            <th>Date retour prévue</th>
                                            <th>Date retour</th>
                                            <th>Statut</th>
                                            <th>Actions</th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        <tr th:each="loan : ${loans}" th:classappend="${loan.overdue} ? 'table-danger' : ''">
                                            <td th:text="${loan.id}"></td>
                                            <td>
                                                <a th:href="@{/books/{id}(id=${loan.book.id})}" class="text-decoration-none fw-semibold" th:text="${loan.book.title}"></a>
                                            </td>
                                            <td>
                                                <a th:href="@{/members/{id}(id=${loan.member.id})}" class="text-decoration-none" th:text="${loan.member.fullName}"></a>
                                            </td>
                                            <td th:text="${#temporals.format(loan.loanDate, 'dd/MM/yyyy')}"></td>
                                            <td th:text="${#temporals.format(loan.dueDate, 'dd/MM/yyyy')}"></td>
                                            <td th:text="${loan.returnDate != null ? #temporals.format(loan.returnDate, 'dd/MM/yyyy') : '-'}"></td>
                                            <td>
                                                <span th:if="${loan.status.name() == 'RETURNED'}" class="badge bg-success">
                                                    <i class="bi bi-check-circle me-1"></i>Retourné
                                                </span>
                                                <span th:if="${loan.status.name() == 'ACTIVE' && loan.overdue}" class="badge bg-danger">
                                                    <i class="bi bi-exclamation-triangle me-1"></i>En retard (<span th:text="${loan.daysOverdue}"></span> jours)
                                                </span>
                                                <span th:if="${loan.status.name() == 'ACTIVE' && !loan.overdue}" class="badge bg-warning">
                                                    <i class="bi bi-clock me-1"></i>Actif (<span th:text="${loan.daysRemaining}"></span> jours restants)
                                                </span>
                                            </td>
                                            <td>
                                                <div class="btn-group btn-group-sm">
                                                    <a th:href="@{/loans/{id}(id=${loan.id})}" class="btn btn-outline-primary" title="Voir">
                                                        <i class="bi bi-eye"></i>
                                                    </a>
                                                    <form th:if="${loan.status.name() == 'ACTIVE'}" th:action="@{/loans/{id}/return(id=${loan.id})}" method="post" class="d-inline">
                                                        <button type="submit" class="btn btn-outline-success" title="Retourner">
                                                            <i class="bi bi-check-circle"></i>
                                                        </button>
                                                    </form>
                                                    <form th:action="@{/loans/{id}/delete(id=${loan.id})}" method="post" class="d-inline"
                                                          onsubmit="return confirm('Êtes-vous sûr?')">
                                                        <button type="submit" class="btn btn-outline-danger" title="Supprimer">
                                                            <i class="bi bi-trash"></i>
                                                        </button>
                                                    </form>
                                                </div>
                                            </td>
                                        </tr>
                                        <tr th:if="${#lists.isEmpty(loans)}">
                                            <td colspan="8" class="text-center py-5 text-muted">
                                                <i class="bi bi-arrow-left-right fs-1 d-block mb-2"></i>
                                                Aucun emprunt trouvé
                                                <br>
                                                <a th:href="@{/loans/new}" class="btn btn-primary mt-3">Créer un emprunt</a>
                                            </td>
                                        </tr>
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <footer th:replace="~{fragments/layout :: scripts}"></footer>
</body>
</html>
