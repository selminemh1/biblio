<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Emprunt')}"></head>
<body>
    <nav th:replace="~{fragments/layout :: navbar}"></nav>
    
    <div class="container-fluid">
        <div class="row">
            <div class="col-md-2 p-0">
                <div th:replace="~{fragments/layout :: sidebar}"></div>
            </div>
            <div class="col-md-10">
                <div class="content-wrapper">
                    <div class="page-header d-flex justify-content-between align-items-center">
                        <div>
                            <nav aria-label="breadcrumb">
                                <ol class="breadcrumb mb-2">
                                    <li class="breadcrumb-item"><a th:href="@{/loans}">Emprunts</a></li>
                                    <li class="breadcrumb-item active">Emprunt #<span th:text="${loan.id}"></span></li>
                                </ol>
                            </nav>
                            <h1>Emprunt #<span th:text="${loan.id}"></span></h1>
                        </div>
                        <div class="d-flex gap-2" th:if="${loan.status.name() == 'ACTIVE'}">
                            <form th:action="@{/loans/{id}/return(id=${loan.id})}" method="post">
                                <button type="submit" class="btn btn-success">
                                    <i class="bi bi-check-circle me-1"></i>Marquer comme retourné
                                </button>
                            </form>
                        </div>
                    </div>

                    <div class="row">
                        <div class="col-md-6">
                            <div class="card mb-4">
                                <div class="card-header bg-white">
                                    <h5 class="mb-0"><i class="bi bi-book me-2"></i>Livre</h5>
                                </div>
                                <div class="card-body">
                                    <h4 th:text="${loan.book.title}"></h4>
                                    <p class="text-muted mb-2">ISBN: <code th:text="${loan.book.isbn}"></code></p>
                                    <a th:href="@{/books/{id}(id=${loan.book.id})}" class="btn btn-outline-primary btn-sm">
                                        Voir le livre <i class="bi bi-arrow-right"></i>
                                    </a>
                                </div>
                            </div>
                        </div>
                        
                        <div class="col-md-6">
                            <div class="card mb-4">
                                <div class="card-header bg-white">
                                    <h5 class="mb-0"><i class="bi bi-person me-2"></i>Membre</h5>
                                </div>
                                <div class="card-body">
                                    <h4 th:text="${loan.member.fullName}"></h4>
                                    <p class="text-muted mb-2" th:text="${loan.member.email}"></p>
                                    <a th:href="@{/members/{id}(id=${loan.member.id})}" class="btn btn-outline-primary btn-sm">
                                        Voir le membre <i class="bi bi-arrow-right"></i>
                                    </a>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="card">
                        <div class="card-header bg-white">
                            <h5 class="mb-0"><i class="bi bi-calendar me-2"></i>Détails de l'emprunt</h5>
                        </div>
                        <div class="card-body">
                            <div class="row">
                                <div class="col-md-3 text-center">
                                    <div class="p-3 rounded bg-light">
                                        <small class="text-muted d-block mb-1">Date d'emprunt</small>
                                        <strong th:text="${#temporals.format(loan.loanDate, 'dd MMMM yyyy', new java.util.Locale('fr', 'FR'))}"></strong>
                                    </div>
                                </div>
                                <div class="col-md-3 text-center">
                                    <div class="p-3 rounded bg-light">
                                        <small class="text-muted d-block mb-1">Date de retour prévue</small>
                                        <strong th:text="${#temporals.format(loan.dueDate, 'dd MMMM yyyy', new java.util.Locale('fr', 'FR'))}"></strong>
                                    </div>
                                </div>
                                <div class="col-md-3 text-center">
                                    <div class="p-3 rounded bg-light">
                                        <small class="text-muted d-block mb-1">Date de retour réelle</small>
                                        <strong th:if="${loan.returnDate != null}" th:text="${#temporals.format(loan.returnDate, 'dd MMMM yyyy', new java.util.Locale('fr', 'FR'))}"></strong>
                                        <strong th:if="${loan.returnDate == null}">-</strong>
                                    </div>
                                </div>
                                <div class="col-md-3 text-center">
                                    <div class="p-3 rounded" th:classappend="${loan.status.name() == 'RETURNED' ? 'bg-success text-white' : (loan.overdue ? 'bg-danger text-white' : 'bg-warning')}">
                                        <small class="d-block mb-1" th:classappend="${loan.status.name() == 'RETURNED' || loan.overdue ? 'text-white-50' : 'text-muted'}">Statut</small>
                                        <strong th:if="${loan.status.name() == 'RETURNED'}"><i class="bi bi-check-circle me-1"></i>Retourné</strong>
                                        <strong th:if="${loan.status.name() == 'ACTIVE' && loan.overdue}"><i class="bi bi-exclamation-triangle me-1"></i>En retard</strong>
                                        <strong th:if="${loan.status.name() == 'ACTIVE' && !loan.overdue}"><i class="bi bi-clock me-1"></i>Actif</strong>
                                    </div>
                                </div>
                            </div>

                            <div class="mt-4" th:if="${loan.status.name() == 'ACTIVE'}">
                                <div class="alert" th:classappend="${loan.overdue ? 'alert-danger' : 'alert-info'}">
                                    <i class="bi" th:classappend="${loan.overdue ? 'bi-exclamation-triangle' : 'bi-info-circle'}" class="me-2"></i>
                                    <span th:if="${loan.overdue}">
                                        Cet emprunt est en retard de <strong th:text="${loan.daysOverdue}"></strong> jour(s).
                                    </span>
                                    <span th:if="${!loan.overdue}">
                                        Il reste <strong th:text="${loan.daysRemaining}"></strong> jour(s) avant la date de retour prévue.
                                    </span>
                                </div>
                            </div>

                            <div class="mt-4" th:if="${loan.notes != null}">
                                <h6>Notes</h6>
                                <p th:text="${loan.notes}"></p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <footer th:replace="~{fragments/layout :: scripts}"></footer>
</body>
</html>
