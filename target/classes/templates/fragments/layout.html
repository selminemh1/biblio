<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:fragment="head(title)">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${title} + ' - Bibliothèque'">Bibliothèque</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #4f46e5;
            --primary-dark: #4338ca;
            --secondary-color: #6366f1;
            --success-color: #10b981;
            --warning-color: #f59e0b;
            --danger-color: #ef4444;
            --dark-color: #1f2937;
            --light-bg: #f8fafc;
            --card-shadow: 0 1px 3px 0 rgb(0 0 0 / 0.1), 0 1px 2px -1px rgb(0 0 0 / 0.1);
            --card-shadow-hover: 0 10px 15px -3px rgb(0 0 0 / 0.1), 0 4px 6px -4px rgb(0 0 0 / 0.1);
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--light-bg);
            color: var(--dark-color);
        }

        .navbar {
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            box-shadow: var(--card-shadow);
        }

        .navbar-brand {
            font-weight: 700;
            font-size: 1.5rem;
        }

        .nav-link {
            font-weight: 500;
            transition: all 0.2s ease;
        }

        .nav-link:hover {
            transform: translateY(-1px);
        }

        .sidebar {
            background: white;
            min-height: calc(100vh - 76px);
            box-shadow: var(--card-shadow);
        }

        .sidebar .nav-link {
            color: var(--dark-color);
            padding: 0.75rem 1.25rem;
            border-radius: 0.5rem;
            margin: 0.25rem 0.75rem;
        }

        .sidebar .nav-link:hover, .sidebar .nav-link.active {
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            color: white;
        }

        .sidebar .nav-link i {
            margin-right: 0.75rem;
        }

        .card {
            border: none;
            border-radius: 1rem;
            box-shadow: var(--card-shadow);
            transition: all 0.3s ease;
        }

        .card:hover {
            box-shadow: var(--card-shadow-hover);
            transform: translateY(-2px);
        }

        .stat-card {
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            color: white;
        }

        .stat-card.success {
            background: linear-gradient(135deg, var(--success-color), #34d399);
        }

        .stat-card.warning {
            background: linear-gradient(135deg, var(--warning-color), #fbbf24);
        }

        .stat-card.danger {
            background: linear-gradient(135deg, var(--danger-color), #f87171);
        }

        .stat-card .stat-icon {
            font-size: 3rem;
            opacity: 0.3;
        }

        .stat-card .stat-number {
            font-size: 2.5rem;
            font-weight: 700;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            border: none;
            border-radius: 0.5rem;
            padding: 0.5rem 1.5rem;
            font-weight: 500;
            transition: all 0.2s ease;
        }

        .btn-primary:hover {
            background: linear-gradient(135deg, var(--primary-dark), var(--primary-color));
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(79, 70, 229, 0.4);
        }

        .btn-outline-primary {
            color: var(--primary-color);
            border-color: var(--primary-color);
            border-radius: 0.5rem;
        }

        .btn-outline-primary:hover {
            background: var(--primary-color);
            border-color: var(--primary-color);
        }

        .table {
            background: white;
            border-radius: 1rem;
            overflow: hidden;
        }

        .table thead {
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            color: white;
        }

        .table th {
            font-weight: 600;
            text-transform: uppercase;
            font-size: 0.75rem;
            letter-spacing: 0.05em;
            padding: 1rem;
        }

        .table td {
            padding: 1rem;
            vertical-align: middle;
        }

        .badge {
            padding: 0.5rem 0.75rem;
            border-radius: 0.5rem;
            font-weight: 500;
        }

        .form-control, .form-select {
            border-radius: 0.5rem;
            border: 1px solid #e5e7eb;
            padding: 0.75rem 1rem;
        }

        .form-control:focus, .form-select:focus {
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1);
        }

        .page-header {
            background: white;
            padding: 1.5rem 2rem;
            border-radius: 1rem;
            margin-bottom: 1.5rem;
            box-shadow: var(--card-shadow);
        }

        .page-header h1 {
            font-weight: 700;
            color: var(--dark-color);
            margin: 0;
        }

        .alert {
            border: none;
            border-radius: 0.75rem;
        }

        .content-wrapper {
            padding: 2rem;
        }

        @media (max-width: 768px) {
            .sidebar {
                display: none;
            }
            .content-wrapper {
                padding: 1rem;
            }
        }
    </style>
</head>

<nav th:fragment="navbar" class="navbar navbar-expand-lg navbar-dark sticky-top">
    <div class="container-fluid">
        <a class="navbar-brand" th:href="@{/}">
            <i class="bi bi-book-half me-2"></i>BiblioTech
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item">
                    <a class="nav-link text-white" th:href="@{/}"><i class="bi bi-house-door me-1"></i>Accueil</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link text-white" th:href="@{/books}"><i class="bi bi-book me-1"></i>Livres</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link text-white" th:href="@{/members}"><i class="bi bi-people me-1"></i>Membres</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link text-white" th:href="@{/loans}"><i class="bi bi-arrow-left-right me-1"></i>Emprunts</a>
                </li>
            </ul>
        </div>
    </div>
</nav>

<div th:fragment="sidebar" class="sidebar py-3">
    <ul class="nav flex-column">
        <li class="nav-item">
            <a class="nav-link" th:href="@{/}">
                <i class="bi bi-speedometer2"></i>Tableau de bord
            </a>
        </li>
        <li class="nav-item">
            <a class="nav-link" th:href="@{/books}">
                <i class="bi bi-book"></i>Livres
            </a>
        </li>
        <li class="nav-item">
            <a class="nav-link" th:href="@{/authors}">
                <i class="bi bi-pen"></i>Auteurs
            </a>
        </li>
        <li class="nav-item">
            <a class="nav-link" th:href="@{/categories}">
                <i class="bi bi-tags"></i>Catégories
            </a>
        </li>
        <li class="nav-item">
            <a class="nav-link" th:href="@{/members}">
                <i class="bi bi-people"></i>Membres
            </a>
        </li>
        <li class="nav-item">
            <a class="nav-link" th:href="@{/loans}">
                <i class="bi bi-arrow-left-right"></i>Emprunts
            </a>
        </li>
        <li class="nav-item mt-3">
            <a class="nav-link" th:href="@{/loans/active}">
                <i class="bi bi-clock-history"></i>Emprunts actifs
            </a>
        </li>
        <li class="nav-item">
            <a class="nav-link text-danger" th:href="@{/loans/overdue}">
                <i class="bi bi-exclamation-triangle"></i>En retard
            </a>
        </li>
    </ul>
</div>

<div th:fragment="alerts">
    <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show" role="alert">
        <i class="bi bi-check-circle me-2"></i>
        <span th:text="${successMessage}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show" role="alert">
        <i class="bi bi-exclamation-circle me-2"></i>
        <span th:text="${errorMessage}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
</div>

<footer th:fragment="scripts">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</footer>
</html>
