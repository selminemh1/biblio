<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Détails du livre')}"></head>
<body>
    <nav th:replace="~{fragments/layout :: navbar}"></nav>
    
    <div class="container-fluid">
        <div class="row">
            <div class="col-md-2 p-0">
                <div th:replace="~{fragments/layout :: sidebar}"></div>
            </div>
            <div class="col-md-10">
                <div class="content-wrapper">
                    <div class="page-header d-flex justify-content-between align-items-center">
                        <div>
                            <nav aria-label="breadcrumb">
                                <ol class="breadcrumb mb-2">
                                    <li class="breadcrumb-item"><a th:href="@{/books}">Livres</a></li>
                                    <li class="breadcrumb-item active" th:text="${book.title}"></li>
                                </ol>
                            </nav>
                            <h1 th:text="${book.title}"></h1>
                        </div>
                        <div class="d-flex gap-2">
                            <a th:href="@{/books/{id}/edit(id=${book.id})}" class="btn btn-outline-primary">
                                <i class="bi bi-pencil me-1"></i>Modifier
                            </a>
                            <form th:action="@{/books/{id}/delete(id=${book.id})}" method="post" class="d-inline"
                                  onsubmit="return confirm('Êtes-vous sûr de vouloir supprimer ce livre?')">
                                <button type="submit" class="btn btn-outline-danger">
                                    <i class="bi bi-trash me-1"></i>Supprimer
                                </button>
                            </form>
                        </div>
                    </div>

                    <div class="row">
                        <div class="col-md-8">
                            <div class="card mb-4">
                                <div class="card-body">
                                    <h5 class="card-title mb-4">Informations du livre</h5>
                                    
                                    <div class="row mb-3">
                                        <div class="col-sm-3 text-muted">ISBN</div>
                                        <div class="col-sm-9"><code th:text="${book.isbn}"></code></div>
                                    </div>
                                    <div class="row mb-3">
                                        <div class="col-sm-3 text-muted">Catégorie</div>
                                        <div class="col-sm-9">
                                            <span class="badge bg-primary" th:text="${book.category?.name ?: 'Non catégorisé'}"></span>
                                        </div>
                                    </div>
                                    <div class="row mb-3">
                                        <div class="col-sm-3 text-muted">Auteur(s)</div>
                                        <div class="col-sm-9">
                                            <span th:each="author, iterStat : ${book.authors}">
                                                <a th:href="@{/authors/{id}(id=${author.id})}" th:text="${author.fullName}"></a>
                                                <span th:if="${!iterStat.last}">, </span>
                                            </span>
                                            <span th:if="${#sets.isEmpty(book.authors)}" class="text-muted">Non spécifié</span>
                                        </div>
                                    </div>
                                    <div class="row mb-3" th:if="${book.publishedDate != null}">
                                        <div class="col-sm-3 text-muted">Date de publication</div>
                                        <div class="col-sm-9" th:text="${#temporals.format(book.publishedDate, 'dd MMMM yyyy', new java.util.Locale('fr', 'FR'))}"></div>
                                    </div>
                                    <div class="row mb-3" th:if="${book.pages != null}">
                                        <div class="col-sm-3 text-muted">Nombre de pages</div>
                                        <div class="col-sm-9" th:text="${book.pages}"></div>
                                    </div>
                                    <div class="row mb-3" th:if="${book.description != null}">
                                        <div class="col-sm-3 text-muted">Description</div>
                                        <div class="col-sm-9" th:text="${book.description}"></div>
                                    </div>
                                </div>
                            </div>
                        </div>
                        
                        <div class="col-md-4">
                            <div class="card mb-4">
                                <div class="card-body text-center">
                                    <div th:if="${book.coverImage != null}">
                                        <img th:src="${book.coverImage}" class="img-fluid rounded mb-3" style="max-height: 300px;">
                                    </div>
                                    <div th:if="${book.coverImage == null}" class="bg-light rounded p-5 mb-3">
                                        <i class="bi bi-book text-muted" style="font-size: 5rem;"></i>
                                    </div>
                                    
                                    <h5>Disponibilité</h5>
                                    <div class="d-flex justify-content-center gap-3 mt-3">
                                        <div class="text-center">
                                            <h3 class="mb-0 text-success" th:text="${book.availableCopies}"></h3>
                                            <small class="text-muted">Disponibles</small>
                                        </div>
                                        <div class="text-center">
                                            <h3 class="mb-0 text-primary" th:text="${book.totalCopies}"></h3>
                                            <small class="text-muted">Total</small>
                                        </div>
                                    </div>
                                    
                                    <div class="mt-4" th:if="${book.available}">
                                        <a th:href="@{/loans/new}" class="btn btn-primary btn-lg w-100">
                                            <i class="bi bi-plus-circle me-2"></i>Créer un emprunt
                                        </a>
                                    </div>
                                    <div class="mt-4" th:if="${!book.available}">
                                        <button class="btn btn-secondary btn-lg w-100" disabled>
                                            <i class="bi bi-x-circle me-2"></i>Indisponible
                                        </button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <footer th:replace="~{fragments/layout :: scripts}"></footer>
</body>
</html>
