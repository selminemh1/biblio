<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head(${category.id != null ? 'Modifier la catégorie' : 'Nouvelle catégorie'})}"></head>
<body>
    <nav th:replace="~{fragments/layout :: navbar}"></nav>
    
    <div class="container-fluid">
        <div class="row">
            <div class="col-md-2 p-0">
                <div th:replace="~{fragments/layout :: sidebar}"></div>
            </div>
            <div class="col-md-10">
                <div class="content-wrapper">
                    <div class="page-header">
                        <h1>
                            <i class="bi bi-tags me-2"></i>
                            <span th:text="${category.id != null ? 'Modifier la catégorie' : 'Nouvelle catégorie'}"></span>
                        </h1>
                    </div>

                    <div class="card">
                        <div class="card-body p-4">
                            <form th:action="${category.id != null ? '/categories/' + category.id : '/categories'}" 
                                  th:object="${category}" method="post">
                                <div class="mb-3">
                                    <label class="form-label fw-semibold">Nom *</label>
                                    <input type="text" th:field="*{name}" class="form-control" 
                                           th:classappend="${#fields.hasErrors('name')} ? 'is-invalid'" required>
                                    <div class="invalid-feedback" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></div>
                                </div>

                                <div class="mb-3">
                                    <label class="form-label fw-semibold">Description</label>
                                    <textarea th:field="*{description}" class="form-control" rows="4"></textarea>
                                </div>

                                <div class="d-flex justify-content-between pt-3 border-top">
                                    <a th:href="@{/categories}" class="btn btn-outline-secondary">
                                        <i class="bi bi-arrow-left me-1"></i>Annuler
                                    </a>
                                    <button type="submit" class="btn btn-primary">
                                        <i class="bi bi-check-circle me-1"></i>
                                        <span th:text="${category.id != null ? 'Mettre à jour' : 'Créer la catégorie'}"></span>
                                    </button>
                                </div>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <footer th:replace="~{fragments/layout :: scripts}"></footer>
</body>
</html>
