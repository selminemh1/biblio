# =============================================================
# Pipeline CI/CD — Library Management System
# DevSecOps : Build → Test → Security Scan → Push → Deploy
# Déclenché sur : push main/develop + Pull Requests
# =============================================================

name: CI/CD Pipeline

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main

env:
  DOCKERHUB_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/library-management
  JAVA_VERSION: '21'

jobs:

  # ═══════════════════════════════════════════════════════════
  # JOB 1 — BUILD & TEST
  # Compile le projet et lance les tests JUnit
  # ═══════════════════════════════════════════════════════════
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven
        run: mvn clean compile -B

      - name: Run unit tests
        run: mvn test -B

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: target/surefire-reports/
          retention-days: 7

  # ═══════════════════════════════════════════════════════════
  # JOB 2 — OWASP DEPENDENCY CHECK (DevSecOps)
  # Analyse les dépendances Maven pour détecter les CVE
  # ═══════════════════════════════════════════════════════════
  owasp-scan:
    name: OWASP Dependency Check
    runs-on: ubuntu-latest
    needs: build-and-test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: maven

      - name: Run OWASP Dependency Check
        run: mvn dependency-check:check -B
        continue-on-error: true    # ne bloque pas le pipeline (rapport généré quand même)

      - name: Upload OWASP report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: owasp-report
          path: target/dependency-check-report/
          retention-days: 14

  # ═══════════════════════════════════════════════════════════
  # JOB 3 — BUILD IMAGE DOCKER
  # Construit l'image Docker du projet
  # ═══════════════════════════════════════════════════════════
  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: build-and-test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false              # pas encore push, juste build pour vérifier
          tags: ${{ env.DOCKERHUB_IMAGE }}:test
          cache-from: type=gha
          cache-to: type=gha,mode=max
          outputs: type=docker    # charger l'image en local pour le scan Trivy

      - name: Save Docker image
        run: docker save ${{ env.DOCKERHUB_IMAGE }}:test -o image.tar

      - name: Upload image artifact
        uses: actions/upload-artifact@v4
        with:
          name: docker-image
          path: image.tar
          retention-days: 1

  # ═══════════════════════════════════════════════════════════
  # JOB 4 — TRIVY SECURITY SCAN (DevSecOps)
  # Scan des vulnérabilités CVE dans l'image Docker
  # ═══════════════════════════════════════════════════════════
  trivy-scan:
    name: Trivy Security Scan
    runs-on: ubuntu-latest
    needs: docker-build

    steps:
      - name: Download Docker image
        uses: actions/download-artifact@v4
        with:
          name: docker-image

      - name: Load Docker image
        run: docker load -i image.tar

      - name: Run Trivy vulnerability scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.DOCKERHUB_IMAGE }}:test
          format: 'table'
          exit-code: '0'           # ne bloque pas (rapport affiché dans les logs)
          severity: 'CRITICAL,HIGH'
          output: trivy-report.txt

      - name: Upload Trivy report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: trivy-report
          path: trivy-report.txt
          retention-days: 14

  # ═══════════════════════════════════════════════════════════
  # JOB 5 — PUSH SUR DOCKER HUB
  # Uniquement sur push vers main ou develop (pas sur PR)
  # ═══════════════════════════════════════════════════════════
  docker-push:
    name: Push to Docker Hub
    runs-on: ubuntu-latest
    needs: [owasp-scan, trivy-scan]
    if: github.event_name == 'push'   # pas sur Pull Request

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Generate image tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DOCKERHUB_IMAGE }}
          tags: |
            type=sha,prefix=,suffix=,format=short
            type=ref,event=branch
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Print pushed image info
        run: |
          echo "Image pushed to Docker Hub"
          echo "Tags: ${{ steps.meta.outputs.tags }}"

  # ═══════════════════════════════════════════════════════════
  # JOB 6 — DEPLOY (simulation — sera remplacé par ECS)
  # Sur main uniquement → simule un déploiement
  # ═══════════════════════════════════════════════════════════
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: docker-push
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production

    steps:
      - name: Deployment summary
        run: |
          echo "========================================"
          echo "  Déploiement — Library Management"
          echo "========================================"
          echo "Branch  : ${{ github.ref_name }}"
          echo "Commit  : ${{ github.sha }}"
          echo "Image   : ${{ env.DOCKERHUB_IMAGE }}:latest"
          echo "Status  : Prêt pour ECS (Phase suivante)"
          echo "========================================"