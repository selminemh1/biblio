# =============================================================
# Pipeline CI/CD — Library Management System
# DevSecOps : Build → Test → Security Scan → Push ECR → Deploy ECS
# Déclenché sur : push main/develop + Pull Requests
# =============================================================

name: CI/CD Pipeline

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main

env:
  AWS_REGION: us-east-1
  AWS_ACCOUNT_ID: ${{ secrets.AWS_ACCOUNT_ID }}
  ECR_REPOSITORY: library-management
  ECS_CLUSTER: library-management-cluster
  ECS_SERVICE: library-management-service

jobs:

  # ═══════════════════════════════════════════════════════════
  # JOB 1 — BUILD & TEST
  # ═══════════════════════════════════════════════════════════
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven
        run: mvn clean compile -B

      - name: Run unit tests
        run: mvn test -B

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: target/surefire-reports/
          retention-days: 7

  # ═══════════════════════════════════════════════════════════
  # JOB 2 — OWASP DEPENDENCY CHECK (DevSecOps)
  # ═══════════════════════════════════════════════════════════
  owasp-scan:
    name: OWASP Dependency Check
    runs-on: ubuntu-latest
    needs: build-and-test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Run OWASP Dependency Check
        run: mvn dependency-check:check -B
        continue-on-error: true

      - name: Upload OWASP report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: owasp-report
          path: target/dependency-check-report/
          retention-days: 14

  # ═══════════════════════════════════════════════════════════
  # JOB 3 — BUILD IMAGE DOCKER
  # ═══════════════════════════════════════════════════════════
  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: build-and-test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: ${{ env.ECR_REPOSITORY }}:test
          cache-from: type=gha
          cache-to: type=gha,mode=max
          outputs: type=docker

      - name: Save Docker image
        run: docker save ${{ env.ECR_REPOSITORY }}:test -o image.tar

      - name: Upload image artifact
        uses: actions/upload-artifact@v4
        with:
          name: docker-image
          path: image.tar
          retention-days: 1

  # ═══════════════════════════════════════════════════════════
  # JOB 4 — TRIVY SECURITY SCAN (DevSecOps)
  # ═══════════════════════════════════════════════════════════
  trivy-scan:
    name: Trivy Security Scan
    runs-on: ubuntu-latest
    needs: docker-build

    steps:
      - name: Download Docker image
        uses: actions/download-artifact@v4
        with:
          name: docker-image

      - name: Load Docker image
        run: docker load -i image.tar

      - name: Run Trivy vulnerability scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.ECR_REPOSITORY }}:test
          format: 'table'
          exit-code: '0'
          severity: 'CRITICAL,HIGH'
          output: trivy-report.txt

      - name: Upload Trivy report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: trivy-report
          path: trivy-report.txt
          retention-days: 14

  # ═══════════════════════════════════════════════════════════
  # JOB 5 — PUSH SUR AMAZON ECR
  # Uniquement sur push vers main ou develop
  # ═══════════════════════════════════════════════════════════
  docker-push-ecr:
    name: Push to Amazon ECR
    runs-on: ubuntu-latest
    needs: [owasp-scan, trivy-scan]
    if: github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Generate image tags
        id: meta
        run: |
          SHORT_SHA=$(echo ${{ github.sha }} | cut -c1-7)
          echo "sha_tag=$SHORT_SHA" >> $GITHUB_OUTPUT
          echo "ecr_uri=${{ env.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.ECR_REPOSITORY }}" >> $GITHUB_OUTPUT

      - name: Build and push to ECR
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ steps.meta.outputs.ecr_uri }}:latest
            ${{ steps.meta.outputs.ecr_uri }}:${{ steps.meta.outputs.sha_tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Print image info
        run: |
          echo " Image pushed to ECR"
          echo "URI: ${{ steps.meta.outputs.ecr_uri }}:latest"
          echo "SHA: ${{ steps.meta.outputs.ecr_uri }}:${{ steps.meta.outputs.sha_tag }}"

  # ═══════════════════════════════════════════════════════════
  # JOB 6 — DEPLOY SUR ECS
  # Uniquement sur push vers main
  # ═══════════════════════════════════════════════════════════
  deploy-ecs:
    name: Deploy to ECS
    runs-on: ubuntu-latest
    needs: docker-push-ecr
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Force new ECS deployment
        run: |
          aws ecs update-service \
            --cluster ${{ env.ECS_CLUSTER }} \
            --service ${{ env.ECS_SERVICE }} \
            --force-new-deployment \
            --region ${{ env.AWS_REGION }}

      - name: Wait for ECS deployment
        run: |
          aws ecs wait services-stable \
            --cluster ${{ env.ECS_CLUSTER }} \
            --services ${{ env.ECS_SERVICE }} \
            --region ${{ env.AWS_REGION }}

      - name: Deployment summary
        run: |
          echo "========================================"
          echo "  Deploiement ECS - Library Management"
          echo "========================================"
          echo "Branch  : ${{ github.ref_name }}"
          echo "Commit  : ${{ github.sha }}"
          echo "Cluster : ${{ env.ECS_CLUSTER }}"
          echo "Service : ${{ env.ECS_SERVICE }}"
          echo "Status  : Deploiement termine avec succes"
          echo "========================================"
